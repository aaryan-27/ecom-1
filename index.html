<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pop Culture - Wear Your Culture. Premium streetwear t-shirts inspired by anime, movies, music & memes. Based in Gurugram, India." />
  <title>Pop Culture — Wear Your Culture</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['"Bebas Neue"', 'Impact', 'sans-serif'],
            grotesk: ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            ink: '#0a0a0a',
            cream: '#f7f3ec',
            acid: '#d4ff00',
            hot: '#ff2d55',
            electric: '#00eaff',
          },
          animation: {
            marquee: 'marquee 30s linear infinite',
            'fade-up': 'fadeUp 0.6s ease-out',
            'slide-in': 'slideIn 0.35s ease-out',
          },
          keyframes: {
            marquee: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(0)' },
            },
          },
        },
      },
    }
  </script>

  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #f7f3ec; color: #0a0a0a; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Bebas Neue', Impact, sans-serif; letter-spacing: 0.02em; }
    .noise::before {
      content:""; position:absolute; inset:0; pointer-events:none; opacity:.06;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
    }
    /* thin scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f0ebe1; }
    ::-webkit-scrollbar-thumb { background: #0a0a0a; border-radius: 0; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    .tilt-card { transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .5s; }
    .tilt-card:hover { transform: translateY(-6px); }

    .btn-primary {
      background:#0a0a0a; color:#f7f3ec; padding:14px 28px; font-weight:600;
      letter-spacing:.04em; text-transform:uppercase; font-size:.85rem;
      display:inline-flex; align-items:center; gap:10px;
      border:2px solid #0a0a0a; transition: all .25s;
    }
    .btn-primary:hover { background:#d4ff00; color:#0a0a0a; }
    .btn-outline {
      background:transparent; color:#0a0a0a; padding:14px 28px; font-weight:600;
      letter-spacing:.04em; text-transform:uppercase; font-size:.85rem;
      display:inline-flex; align-items:center; gap:10px;
      border:2px solid #0a0a0a; transition: all .25s;
    }
    .btn-outline:hover { background:#0a0a0a; color:#f7f3ec; }
    .chip {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 12px; border:1px solid #0a0a0a; background:transparent;
      font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
      cursor:pointer; transition: all .2s;
    }
    .chip.active, .chip:hover { background:#0a0a0a; color:#f7f3ec; }

    /* marquee */
    .marquee { overflow:hidden; }
    .marquee-track { display:flex; width:max-content; animation: marquee 30s linear infinite; }

    /* product grid hover */
    .product-card img.front { transition: opacity .35s; }
    .product-card:hover img.front { opacity: 0; }
    .product-card .back { opacity: 0; transition: opacity .35s; }
    .product-card:hover .back { opacity: 1; }
    .quick-view { transform: translateY(100%); transition: transform .3s; }
    .product-card:hover .quick-view { transform: translateY(0); }

    /* drawer */
    .drawer-enter { transform: translateX(100%); }
    .drawer-enter-active { transform: translateX(0); transition: transform .3s ease; }

    .ticker-rotate:hover { animation-play-state: paused; }

    /* ---- Header animations ---- */
    @keyframes headerDrop {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .header-drop { animation: headerDrop .55s cubic-bezier(.2,.8,.2,1) both; }

    @keyframes announceSlide {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
    .announce-slide { animation: announceSlide .45s ease-out both; }

    .header-shell { transition: height .3s ease, box-shadow .3s ease, background-color .3s ease; }
    .header-shell.scrolled { height: 3.25rem; box-shadow: 0 6px 24px rgba(0,0,0,.10); background-color: rgba(247,243,236,.88); }
    .header-shell.scrolled .logo-main { font-size: 1.75rem; }

    /* Logo */
    .logo-wrap { display:inline-flex; align-items:baseline; position:relative; }
    .logo-wrap .dot {
      display:inline-block; color:#ff2d55; margin:0 1px;
      animation: dotPulse 1.8s ease-in-out infinite;
      transform-origin:center;
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.55); opacity: .55; }
    }
    .logo-main { display:inline-block; transition: letter-spacing .4s ease, transform .4s ease; }
    .logo-wrap:hover .logo-main { letter-spacing: .05em; }
    .logo-wrap:hover .dot { animation-duration: .5s; color:#d4ff00; }

    /* Nav underline */
    .nav-link { position:relative; padding: 4px 0; }
    .nav-link::after {
      content:""; position:absolute; left:0; right:0; bottom:-2px; height:2px;
      background:#ff2d55; transform: scaleX(0); transform-origin: left center;
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
    }
    .nav-link:hover::after, .nav-link.is-active::after { transform: scaleX(1); }
    .nav-link::before {
      content:""; position:absolute; left:-8px; top:50%; width:4px; height:4px;
      background:#d4ff00; border-radius:50%; transform:translate(-4px,-50%) scale(0);
      transition: transform .3s ease;
    }
    .nav-link.is-active::before { transform:translate(0,-50%) scale(1); }

    /* Icon buttons */
    .icon-btn { transition: transform .25s cubic-bezier(.2,.8,.2,1), color .2s; }
    .icon-btn:hover { transform: translateY(-2px) scale(1.08); color:#ff2d55; }
    .icon-btn:active { transform: scale(.94); }

    /* Cart icon bounce on count change */
    @keyframes cartJiggle {
      0%,100% { transform: translate(0,0) rotate(0); }
      15%     { transform: translate(-2px,-5px) rotate(-12deg); }
      35%     { transform: translate(2px,2px) rotate(8deg); }
      55%     { transform: translate(-1px,-2px) rotate(-5deg); }
      80%     { transform: translate(0,0) rotate(2deg); }
    }
    .cart-jiggle { animation: cartJiggle .7s ease; }

    /* Cart count pop */
    @keyframes countPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.55); background:#d4ff00; color:#0a0a0a; }
      100% { transform: scale(1); }
    }
    .count-pop { animation: countPop .5s ease; }

    /* Announcement bar dot twinkle */
    @keyframes twinkle { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.35; transform:scale(.7); } }
    .twinkle { animation: twinkle 1.4s ease-in-out infinite; }

    /* Live-dot for "new drop" pill */
    @keyframes livePulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,45,85,.7); }
      70%  { box-shadow: 0 0 0 10px rgba(255,45,85,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,45,85,0); }
    }
    .live-dot { animation: livePulse 1.8s infinite; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="src/data.js"></script>
  <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
